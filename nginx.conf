events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    server {
        listen 80;

        # Fichiers médias (Vidéo HLS)
        location /media/ {
            alias /usr/share/nginx/html/media/;
            add_header Access-Control-Allow-Origin *;
            add_header Cache-Control "public, max-age=3600";
        }

        # Proxy vers l'API Backend NestJS
        location /api/ {
            proxy_pass http://backend:3000/;
            proxy_set_header Host $host;
            # Transmission de l'IP réelle du client au backend (Crucial pour la sécurité)
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Proxy vers le Frontend React (Vite)
        location / {
            proxy_pass http://frontend:5173/;
            proxy_set_header Host $host;
            
            # Support des WebSockets (Nécessaire pour le Hot Module Replacement de Vite)
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
